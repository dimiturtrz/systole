# House rule (owner): everything meaningful is an object — a top-level function should be a method of the
# class that owns its state/responsibility (a named, injectable seam), not a free function. `main` (the CLI
# entrypoint) is exempt. NOTE: the `# struct:free` comment-marker exemption isn't expressible here (ast-grep
# matches syntax, not adjacent comments) — the advisory list is the review surface; graduate per module.
id: py-top-level-function
language: python
severity: warning
message: "top-level function — prefer a method on the class that owns it (house rule; `main` exempt)"
rule:
  kind: function_definition
  inside:
    kind: module
    stopBy: neighbor
  not:
    has:
      field: name
      regex: "^_?main$"
