# Template for paths.yaml (which is gitignored — it holds your machine's absolute paths).
# Copy this file to paths.yaml and set the roots for your machine.
#
#   cp paths.example.yaml paths.yaml
#
# Data lives OUTSIDE the repo (licensing + size). Env vars CARDIAC_DATA_ROOT /
# CARDIAC_PROCESSED_ROOT override these (handy for CI).
data:
  raw: /path/to/data/raw/mri/acdc          # ACDC inputs (the dir holding training/)
  processed: /path/to/data/processed/mri/acdc   # preprocessing cache (npz)

# cardioview demo defaults: which hearts to bake into the web viewer.
# (cardioview/export_web.py uses these when --patients is not given.)
# Each entry = a full path to a patient folder, OR a bare ID resolved under data.raw.
# Mix freely; add/remove patients here (this file is gitignored).
cardioview:
  hearts:
    - /path/to/data/raw/mri/acdc/training/patient073   # full path, or...
    - patient010                                       # ...a bare ID under data.raw
