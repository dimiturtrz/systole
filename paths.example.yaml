# Template for paths.yaml (gitignored — your machine's absolute path).
#   cp paths.example.yaml paths.yaml   # then set the one path below
#
# ONE data root. Everything else is derived:
#   <data>/raw/<dataset>/   you create raw/ and drop the (register-gated) downloads in:
#                             raw/acdc/, raw/mnm2/, raw/MnM/ (M&Ms-1), raw/task02_heart/
#   <data>/processed/       preprocess cache — created automatically, never touch it
#
# Env CARDIAC_DATA overrides this file (handy for CI).
data: /path/to/cardiac-data
