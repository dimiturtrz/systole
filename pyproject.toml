[project]
name = "cardioseg"
version = "0.1.0"
description = "Cardiac segmentation + function (ejection fraction) across MRI/CT/echo, honestly evaluated."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "scikit-image",
    "nibabel",
    "matplotlib",
    "tqdm",
    "polars",      # the data store + splits (cardioseg/data/{store,splits}.py) — REQUIRED for training
    "pydantic>=2",  # validated hyperparameter configs (cardioseg/hparams.py)
    "omegaconf",   # paths.yaml config loader (cardioseg/config.py)
    "monai>=1.5",
    # torch >=2.7 required for NVIDIA Blackwell (sm_120, RTX 5090). The CUDA build comes from the
    # PyTorch index (see [tool.uv.sources] below), NOT plain PyPI (which is CPU). Verified: 2.10+cu130.
    "torch>=2.7",
]

[project.optional-dependencies]
dev = ["pytest"]
n4 = ["SimpleITK"]            # N4 bias-field correction (preprocess n4=True).
dicom = ["SimpleITK"]        # DICOM I/O (core/data/static/mri/dicom.py, scd adapter). SimpleITK/GDCM reader; `uv run --extra dicom …` (plain `uv run` drops optional extras)
export = ["onnx", "onnxruntime"]   # ONNX export (torch.onnx needs `onnx`) + parity check (core/export_onnx.py)
viz = ["pyvista"]            # cardioview: 3D volume/mesh rendering (VTK)
nnunet = ["nnunetv2>=2.5"]   # external SOTA baseline (baselines/nnunet); kept out of core on purpose
track = ["mlflow", "psutil", "pynvml"]   # experiment tracking + registry (the model store); psutil+pynvml for system (GPU/CPU/mem) metrics — without them mlflow start_run hard-fails when system-metrics logging is enabled
diag = ["captum"]   # attribution diagnostic (evaluation/attribution.py): saliency = what the model attends to. confusion runs without it
mrxcat = ["opencv-python-headless"]   # OFFLINE tooling: run the vendored MRXCAT2.0 warper (external/mrxcat2) to generate phantom label pools. The one dep our env lacks (vtk/scipy/torch/imageio already in core/viz); NOT a runtime dep — we consume its output masks + paint with our own engine (core/data/dynamic/mrxcat.py)
# GPU lane (LINUX-only by marker — cucim/cupy ship no Windows wheels). On Windows these silently
# resolve to nothing; the code falls back to scipy/CPU via a single capability gate. Install on
# linux with `uv sync --extra gpu`.
gpu = ["cupy-cuda13x; sys_platform == 'linux'", "cucim-cu13; sys_platform == 'linux'"]
all = ["SimpleITK", "onnx", "onnxruntime", "pyvista", "nnunetv2>=2.5", "mlflow", "psutil", "pynvml", "captum", "opencv-python-headless", "pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# torch's CUDA build lives on the PyTorch index, not PyPI. Pin it there explicitly so uv resolves the
# cu130 wheel (both Windows + Linux have the RTX 5090) instead of the CPU build. `explicit` = only
# packages pinned via [tool.uv.sources] draw from this index.
[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["core*", "cardioseg*"]
