[project]
name = "cardioseg"
version = "0.1.0"
description = "Cardiac segmentation + function (ejection fraction) across MRI/CT/echo, honestly evaluated."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "scikit-image",
    "nibabel",
    "matplotlib",
    "tqdm",
    "polars",      # the data store + splits (cardioseg/data/{store,splits}.py) — REQUIRED for training
    "pydantic>=2",  # validated hyperparameter configs (cardioseg/hparams.py)
    "omegaconf",   # paths.yaml config loader (cardioseg/config.py)
    "monai>=1.5",
    # torch >=2.7 is required for NVIDIA Blackwell (sm_120, e.g. RTX 5090).
    # Install the CUDA build from the PyTorch index, NOT plain PyPI (which is CPU):
    #   pip install torch --index-url https://download.pytorch.org/whl/cu128
    # Verified working here: torch 2.10.0+cu130 on an RTX 5090.
    "torch>=2.7",
]

[project.optional-dependencies]
dev = ["pytest"]
n4 = ["SimpleITK"]            # N4 bias-field correction (preprocess n4=True). NB HD-DT GPU loss needs cucim = Linux-only.
export = ["onnxruntime"]     # ONNX export + parity check (cardioseg/training/export_onnx.py)
viz = ["pyvista"]            # cardioview: 3D volume/mesh rendering (VTK)
nnunet = ["nnunetv2>=2.5"]   # external SOTA baseline (baselines/nnunet); kept out of core on purpose
all = ["SimpleITK", "onnxruntime", "pyvista", "nnunetv2>=2.5", "pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["cardioseg*"]
