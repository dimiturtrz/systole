name: ci

# Gate for the dev -> main flow: `tests` + `lint` must pass on every PR (and on pushes to dev/main).
# Enforced as required status checks via branch protection on main (merge blocked until green).
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # ENFORCED (blocks the merge): the rules already at zero on shipped code — this catches
      # REGRESSION (a new unused import / undefined name / unsorted imports / lazy import fails CI).
      # Ratchet: add each in-progress family's code to --select as it reaches zero.
      # Remaining advisory (not yet 0 on the enforced path): E501 (bd cardiac-seg-i851). bd cardiac-seg-l79o.
      - name: Lint — enforced (shipped code, clean rules)
        run: uvx ruff@0.15.13 check core cardioseg --select F,I,B,S110,BLE001,C901,PLR0912,PLR0913,PLR0915,T201,PLR2004,PLC0415,FBT,RUF100
      # ADVISORY (never blocks): full curated config over the whole tree — surfaces the families still
      # being cleaned so the count is visible in CI. Becomes the enforced gate once it hits zero.
      - name: Lint — advisory full (non-blocking)
        run: uvx ruff@0.15.13 check . --statistics || true
      # ADVISORY: `ruff format` not applied yet (bd i851) — shows the pending reformat, does not block.
      - name: Format — advisory (non-blocking)
        run: uvx ruff@0.15.13 format --check . || true
      # Vulture — dead code, the axis ruff can't see (bd cardiac-seg-5ogp). Two tiers (paths/ignores in
      # [tool.vulture]). BLOCKS at conf>=80 (near-certain: redundant conditions, unreachable, unused
      # locals — precision high enough to fail the merge).
      - name: Dead code — enforced (vulture conf>=80)
        run: uvx vulture@2.16 --min-confidence 80
      # WARNS at conf>=60 (dead functions/classes — real signal, but eats no-fan-in FPs so it can't
      # block). continue-on-error keeps the job green (yellow ⚠); output is reshaped to ::warning:: PR
      # annotations (first ~10 render inline on the diff, all print in the log).
      - name: Dead code — advisory (vulture conf>=60, warns)
        continue-on-error: true
        run: uvx vulture@2.16 --min-confidence 60 | sed -E 's#^([^:]+):([0-9]+): (.*)$#::warning file=\1,line=\2::\3#'

  tests:
    runs-on: ubuntu-latest
    # no dataset on the runner -> point the data root at an empty POSIX dir so the data-gated tests
    # skip cleanly (adapters glob an absent raw/ -> no subjects -> pytest.skip) instead of erroring on
    # a missing paths.yaml. A plain POSIX path needs no Windows->mount translation, so resolve_data_root
    # uses it as-is.
    env:
      CARDIAC_DATA: /tmp/cardiac-nodata
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (locked, + dev extra for pytest)
        run: uv sync --frozen --extra dev
      # One instrumented run = the test gate AND the coverage report (no double suite execution).
      # Tests BLOCK on failure; coverage is ADVISORY — it only prints term-missing (no --cov-fail-under,
      # so it never fails the build). Config (source/omit/exclude) is in [tool.coverage.*]. Integration
      # tests skip cleanly on the data-less runner. Ratchet (bd cardiac-seg-emko): add a fail-under floor
      # once a baseline is agreed, then raise it.
      - name: Tests + coverage (coverage advisory)
        run: uv run pytest tests --cov --cov-report=term-missing -q
