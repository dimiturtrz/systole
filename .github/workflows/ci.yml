name: ci

# Gate for the dev -> main flow: `lint` + `tests` must pass on every PR (and on pushes to main).
# Enforced as required status checks via branch protection. Shipped example code is clean, so the
# gates BLOCK from the first generation (they are regression guards, not a mid-ratchet backlog).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same ref cancels the older in-flight run (no stacking on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # ENFORCED (blocks the merge): the full house select over shipped source. Clean on a fresh gen;
      # catches REGRESSION (new unused import / undefined name / unsorted imports / magic number / ...).
      # An explicit --select BYPASSES pyproject [tool.ruff.lint] ignore, so the ml F722 waiver (jaxtyping
      # `Float[Tensor, "b c h w"]` dim strings misread as bad forward refs) must be repeated on the CLI —
      # else a fresh ml gen with any jaxtyping annotation red-CIs on its own shipped config (bd skr GAP1).
      - name: Lint — enforced (shipped source, full select)
        run: uvx ruff@0.15.13 check core cardioseg cardioview tests --select F,B,E501,I,T201,FBT,BLE001,S101,S110,C901,PLR0912,PLR0913,PLR0915,PLR2004,PLC0415,RUF100,N,E741,E742,E743,PLR0124,PLR1714,PLW3301,RUF012,RUF005,RUF007,RUF010,RUF022,RUF046,C408,C420,SIM,PERF401,PLW0108,E731,E402,ICN001,S603,S607,PTH123,SLF001 --ignore F722
      # ADVISORY (never blocks): full curated config over the whole tree, surfaces any pending families.
      - name: Lint — advisory full (non-blocking)
        run: uvx ruff@0.15.13 check . --statistics || true
      # ADVISORY: format drift, shown but never blocks.
      - name: Format — advisory (non-blocking)
        run: uvx ruff@0.15.13 format --check . || true
      # Dead code — the axis ruff can't see (paths/ignores in [tool.vulture]). BLOCKS at conf>=80
      # (near-certain: unreachable, unused locals — precision high enough to fail the merge).
      - name: Dead code — enforced (vulture conf>=80)
        run: uvx vulture@2.16 --min-confidence 80
      # WARNS at conf>=60 (dead funcs/classes — real signal, but eats no-fan-in FPs so it can't block).
      # continue-on-error keeps the job green (yellow); output is reshaped to ::warning:: PR annotations.
      - name: Dead code — advisory (vulture conf>=60, warns)
        continue-on-error: true
        run: |
          uvx vulture@2.16 --min-confidence 60 | sed -E 's#^([^:]+):([0-9]+): (.*)$#::warning file=\1,line=\2::\3#'
      
      # Import layers — ENFORCED: forbidden-import (directional) contracts, the axis graph.py's cycle
      # check can't express (a one-way core->trainer import is no cycle). Contracts in [tool.importlinter].
      - name: Import layers — enforced (import-linter)
        run: uvx --from import-linter lint-imports
      
      # Module shape — ast-grep: the SYNTACTIC axis ruff has no plugin API for (in-a-class house rule +
      # no import-time side effects). Rules are data under devtools/sg-rules/*.yml, severity=error (BLOCKS).
      - name: "Module shape — enforced (ast-grep)"
        run: uvx --from ast-grep-cli ast-grep scan -c devtools/sgconfig.yml core cardioseg
      # Duplication — the DRY axis (jscpd) the coupling tools can't see. Threshold in devtools/jscpd.json.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Duplication — enforced (jscpd, DRY axis; blocks over threshold)
        run: npx --yes jscpd core cardioseg cardioview/web/src --config devtools/jscpd.json
      # >>> LOCAL-SLOT: ci-lint-steps — repo-specific lint/shape steps that ride ON TOP of the base gates
      # (a viewer-tree extra lint, an un-silenced advisory family, a repo-only static gate). The base gates
      # above are template-owned + regenerated; steps added in this region survive copier update. Empty by
      # default — mechanism identical across repos, only the CONTENTS are a per-repo FACT (bd skr GAP3).
      # Magic STRINGS in COMPARISONS — advisory (bd cardiac-seg-1ln7): PLR2004 defaults to allow
      # ["str","bytes"], silencing string magic values in comparisons; re-run with the allow-list emptied
      # to surface them. The cross-file magic_literals ratchet already blocks NEW recurring literals.
      - name: Magic strings — advisory (PLR2004 un-silenced, comparisons)
        continue-on-error: true
        run: uvx ruff@0.15.13 check core cardioseg cardioview --select PLR2004 --config 'lint.pylint.allow-magic-value-types=[]' || true
      # <<< LOCAL-SLOT: ci-lint-steps

  tests:
    runs-on: ubuntu-latest
    # No dataset on the runner -> point the data root at an empty POSIX dir so data-gated tests skip
    # cleanly (adapters glob an absent raw/ -> no subjects -> pytest.skip) instead of erroring. The env var
    # NAME is a per-repo FACT (data_env_var, bd skr GAP3a) — a repo whose adapters read a different name
    # overrides it in .copier-answers.yml so tests SKIP here instead of erroring on a missing env.
    env:
      CARDIAC_DATA: /tmp/nodata
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (locked, + dev/devtools extras for pytest + graph tests)
        run: uv sync --frozen --extra dev --extra devtools
      # One instrumented run = the test gate AND the coverage data (.coverage), no double suite exec.
      # Config (source/omit/exclude) is in [tool.coverage.*].
      - name: Tests + coverage (tests block)
        run: uv run pytest tests --cov --cov-report=term-missing -q
      # Coverage floor — below the floor fails the merge. Reads the .coverage from the run above.
      - name: Coverage floor — enforced (>=90, blocks)
        run: uv run coverage report --fail-under=90
      # Coverage target — advisory (>=95 warns, never blocks). always() so it shows even if the floor failed.
      - name: Coverage target — advisory (>=95, warns)
        if: always()
        continue-on-error: true
        run: uv run coverage report --fail-under=95 || echo "::warning::coverage below the 95% target"
      # Architecture fitness — the METRIC arch axis (god-module = fan-in AND fan-out over a degree /
      # import cycle / god-file) as a GATE on the grimp+networkx import graph, the axis import-linter's
      # categorical contracts can't express. Thresholds in [tool.structure]. Runs here for the synced env.
      - name: Architecture fitness — enforced (devtools/graph.py --assert)
        run: uv run python -m devtools.graph --assert core cardioseg
      # Magic literals — ENFORCED ratchet: the recurring-string / repeated-key-set count is frozen as a
      # ceiling in [tool.magic_literals]; a NEW magic literal pushes it over and blocks. Mechanism is the
      # base gate; the ceiling NUMBERS are a per-repo FACT (fresh repo = 0/0). The non-comparison axis
      # ruff PLR2004 can't see.
      - name: Magic literals — enforced (ratchet over [tool.magic_literals] ceiling)
        run: uv run python -m devtools.magic_literals core cardioseg
      # Class-shape smells — ADVISORY explorers (never block): LCOM4 cohesion, Fowler data-clumps, and
      # namespace-classes with latent shared state + shape-contracts (bare array/tensor boundaries).
      # Heuristics that rank refactor candidates — surfaced for the reviewer, never a merge gate.
      - name: Class-shape smells — advisory (LCOM / data-clumps / namespace-state / shape-contracts)
        continue-on-error: true
        run: |
          uv run python -m devtools.state_candidates core cardioseg
          uv run python -m devtools.lcom core cardioseg
          uv run python -m devtools.data_clumps core cardioseg
          uv run python -m devtools.shape_contracts core cardioseg
      # >>> LOCAL-SLOT: ci-test-steps — repo-specific test/coverage/gate steps on top of the base (a
      # separate viewer-coverage floor calibrated to library logic, or shape_contracts --assert as a
      # BLOCKING step for a boundary-clean ml repo that graduates ahead of the base advisory). Survives
      # copier update; empty by default (bd skr GAP3).
      # Shape contracts — ENFORCED (bd cardiac-seg-m8xq): cardiac's tensor boundaries are all annotated, so
      # it graduates ahead of the base advisory — a NEW bare-array boundary fails the merge.
      - name: Shape contracts — enforced (bare array/tensor boundaries must carry a jaxtyping shape)
        run: uv run python -m devtools.shape_contracts --assert core cardioseg
      # cardioview logic tests + coverage, REPORTED separately (own .coverage.cardioview, advisory) so the
      # core+cardioseg floor stays calibrated to library logic. bd cardiac-seg-3vbc.
      - name: cardioview tests + coverage (logic, advisory)
        continue-on-error: true
        run: PYTHONPATH=. COVERAGE_FILE=.coverage.cardioview uv run pytest tests/cardioview --cov=cardioview --cov-report=term-missing -q
      # <<< LOCAL-SLOT: ci-test-steps

