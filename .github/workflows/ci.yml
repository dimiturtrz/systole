name: ci

# Gate for the dev -> main flow: `tests` + `lint` must pass on every PR (and on pushes to dev/main).
# Enforced as required status checks via branch protection on main (merge blocked until green).
# pull_request validates the dev->main PR — reruns on every push to the PR head (synchronize) and tests
# the MERGE PREVIEW (branch merged into main), not the raw head. push:[main] adds a post-merge safety
# net. A dev push isn't a push to main, so only one event ever handles a given commit — no double-run.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels the older in-flight run (no stacking on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # ENFORCED (blocks the merge): the rules already at zero on shipped code — this catches
      # REGRESSION (a new unused import / undefined name / unsorted imports / lazy import fails CI).
      # Ratchet: add each in-progress family's code to --select as it reaches zero.
      # Remaining advisory (not yet 0 on the enforced path): E501 (bd cardiac-seg-i851). bd cardiac-seg-l79o.
      - name: Lint — enforced (shipped code, clean rules)
        run: uvx ruff@0.15.13 check core cardioseg cardioview --select F,I,B,S110,BLE001,C901,PLR0912,PLR0913,PLR0915,T201,PLR2004,PLC0415,FBT,RUF100
      # ADVISORY (never blocks): full curated config over the whole tree — surfaces the families still
      # being cleaned so the count is visible in CI. Becomes the enforced gate once it hits zero.
      - name: Lint — advisory full (non-blocking)
        run: uvx ruff@0.15.13 check . --statistics || true
      # ADVISORY: `ruff format` not applied yet (bd i851) — shows the pending reformat, does not block.
      - name: Format — advisory (non-blocking)
        run: uvx ruff@0.15.13 format --check . || true
      # Vulture — dead code, the axis ruff can't see (bd cardiac-seg-5ogp). Two tiers (paths/ignores in
      # [tool.vulture]). BLOCKS at conf>=80 (near-certain: redundant conditions, unreachable, unused
      # locals — precision high enough to fail the merge).
      - name: Dead code — enforced (vulture conf>=80)
        run: uvx vulture@2.16 --min-confidence 80
      # WARNS at conf>=60 (dead functions/classes — real signal, but eats no-fan-in FPs so it can't
      # block). continue-on-error keeps the job green (yellow ⚠); output is reshaped to ::warning:: PR
      # annotations (first ~10 render inline on the diff, all print in the log).
      - name: Dead code — advisory (vulture conf>=60, warns)
        continue-on-error: true
        run: |
          uvx vulture@2.16 --min-confidence 60 | sed -E 's#^([^:]+):([0-9]+): (.*)$#::warning file=\1,line=\2::\3#'
      # Architecture layers — the dependency rule as a static import-graph contract (bd cardiac-seg-dsz2).
      # BLOCKS: core must import neither cardioseg nor cardioview; the viewer never the trainer. Contracts
      # in [tool.importlinter]. Fails the day a new upward edge lands.
      - name: Import layers — enforced (import-linter)
        run: uvx --from import-linter lint-imports
      # Module shape — ast-grep (bd cardiac-seg-d1fa/y2fi): the SYNTACTIC axis ruff has no plugin API for.
      # Rules are data (devtools/sg-rules/*.yml), zero-bag, both severity=error (BLOCKING). Enforces the
      # everything-in-a-class house rule (0 top-level funcs, migrated from 328 in y2fi; `main` exempt) + no
      # import-time side-effect call (matplotlib.use exempt). A new top-level function or import-time call fails CI.
      - name: "Module shape — enforced (ast-grep: in-a-class + no import-time side effects)"
        run: uvx --from ast-grep-cli ast-grep scan -c devtools/sgconfig.yml core cardioseg
      # Duplication — the DRY axis (bd cardiac-seg-tte0), which the coupling tools (import-linter/graph)
      # can't see. jscpd over python + TS; threshold in .jscpd.json (repo is ~0.23%/0% today, so this is a
      # REGRESSION GUARD). ADVISORY while the Node step proves stable; graduate to blocking after.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Duplication — advisory (jscpd, DRY axis)
        continue-on-error: true
        run: npx --yes jscpd core cardioseg cardioview/web/src --config devtools/jscpd.json

  tests:
    runs-on: ubuntu-latest
    # no dataset on the runner -> point the data root at an empty POSIX dir so the data-gated tests
    # skip cleanly (adapters glob an absent raw/ -> no subjects -> pytest.skip) instead of erroring on
    # a missing paths.yaml. A plain POSIX path needs no Windows->mount translation, so resolve_data_root
    # uses it as-is.
    env:
      CARDIAC_DATA: /tmp/cardiac-nodata
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (locked, + dev/devtools extras for pytest + graph tests)
        run: uv sync --frozen --extra dev --extra devtools
      # One instrumented run = the test gate AND the coverage data (.coverage), no double suite exec.
      # Config (source/omit/exclude) is in [tool.coverage.*]. Integration tests skip on the data-less runner.
      - name: Tests + coverage (tests block)
        run: uv run pytest tests --ignore=tests/cardioview --cov --cov-report=term-missing -q
      # cardioview's own logic tests (pure numpy + core) — gate them too so cardioview logic
      # regressions are caught. cardioview isn't pip-installed (not in packages.find), so put the repo
      # root on PYTHONPATH for the `cardioview.` package import. Coverage is REPORTED separately here
      # (--cov=cardioview, its own .coverage.cardioview data file) — NOT folded into the core+cardioseg
      # floor above, whose >=80 gate is calibrated to that source. Advisory print; render/onnx/file-write
      # shells are pragma'd, so the % reflects the pure plottable-data logic. bd cardiac-seg-3vbc.
      - name: cardioview tests + coverage (logic, advisory)
        run: PYTHONPATH=. COVERAGE_FILE=.coverage.cardioview uv run pytest tests/cardioview --cov=cardioview --cov-report=term-missing -q
      # Coverage RED tier (mirrors vulture conf80): below 80% fails the merge. Reads the .coverage from
      # the run above. bd cardiac-seg-emko — reaching 80 honestly is tracked in 7bbq.
      - name: Coverage floor — enforced (>=80, blocks)
        run: uv run coverage report --fail-under=80
      # Coverage YELLOW tier (mirrors vulture conf60): 80–95 warns, never blocks. `always()` so the
      # target signal shows even when the floor failed; `continue-on-error` keeps it non-blocking.
      - name: Coverage target — advisory (>=95, warns)
        if: always()
        continue-on-error: true
        run: uv run coverage report --fail-under=95 || echo "::warning::coverage below the 95% target"
      # Architecture fitness — the METRIC arch axis (god-module = fan-in AND fan-out both over a degree /
      # import cycle / god-file) as a GATE on the grimp+networkx import graph, the axis import-linter's
      # categorical contracts can't express. BLOCKS on the rules clean today (they ratchet — a new
      # god-module/cycle/oversized file fails CI); line-floor + chokepoint are advisory (logged, never
      # fail). Thresholds in pyproject [tool.structure]. Runs here (tests job) for the synced devtools
      # env (grimp/networkx). bd cardiac-seg-g0b2.
      - name: Architecture fitness — enforced (devtools/graph.py --assert)
        run: uv run python -m devtools.graph --assert
      # Class-shape smells — advisory (devtools AST detectors, bd cardiac-seg-h7vy.4 / xj5d). The three
      # smells the promotions targeted: state_candidates (namespace-class with latent shared state ->
      # __init__), data_clumps (params travelling together -> Introduce Parameter Object), lcom (LCOM4
      # disjoint-state class -> split). ADVISORY, never blocking — each has a legitimately non-zero floor:
      # state_candidates/data_clumps top out on the pure functional core (Evaluate/Measure) + swept-gen
      # data, and lcom's interface/ABC/stub exclusions are heuristic on a strategy-pattern codebase. So
      # they're a regression radar (a NEW smell shows in the log), not a gate.
      - name: Class-shape smells — advisory (namespace / data-clump / LCOM)
        continue-on-error: true
        run: |
          uv run python -m devtools.state_candidates
          uv run python -m devtools.data_clumps
          uv run python -m devtools.lcom
